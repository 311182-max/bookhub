<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookHub 智慧書籍管理系統</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📚 BookHub</h1>
        <p>智慧書籍管理系統</p>
    </header>

    <main>

        <section class="search-area">

            <h2>搜尋書籍</h2>

            <input
                type="text"
                id="searchInput"
                placeholder="請輸入書名">

            <button id="searchBtn">
                🔍 搜尋
            </button>

        </section>

        <section id="result">

            <h2>搜尋結果</h2>

            <div class="empty">

                尚未搜尋任何書籍

            </div>

        </section>

    </main>

<script src="script.js"></script>

</body>

</html>
